        content: "";
        position: absolute;
        inset: 0;
        background: rgba(255, 255, 255, 0.75);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 48px;
        font-weight: 700;
        letter-spacing: 3px;
        color: #111;
      }

      /* RESPONSIVE */

        }

    <div class="otp-wrapper">
      <!-- LEFT -->
      <div class="otp-left">
        <span class="brand">Enva Clothing</span>
        <h2>Check your email</h2>
        <p>
          We sent a code to <span id="userEmail">your@email.com</span>
        </p>

        <div class="otp-inputs">
          <input class="otp-box" maxlength="1" />
          <input class="otp-box" maxlength="1" />
          <input class="otp-box" maxlength="1" />
          <input class="otp-box" maxlength="1" />
          <input class="otp-box" maxlength="1" />
          <input class="otp-box" maxlength="1" />
        </div>

        <button class="verify-btn" onclick="verifyOtp()">Verify Code</button>

        <div class="otp-note">Check your Email for the OTP</div>
      </div>

      <!-- RIGHT -->
      <div class="otp-right"></div>
    </div>

    
   <script>
  const inputs = document.querySelectorAll(".otp-box");

  // Auto move input
  inputs.forEach((input, index) => {
    input.addEventListener("input", () => {
      if (input.value && index < inputs.length - 1) {
        inputs[index + 1].focus();
      }
    });

    input.addEventListener("keydown", (e) => {
      if (e.key === "Backspace" && !input.value && index > 0) {
        inputs[index - 1].focus();
      }
    });
  });

  // ✅ GET EMAIL FROM LOCAL STORAGE
  const email = localStorage.getItem("signupEmail");
  document.getElementById("userEmail").innerText =
    email || "your@email.com";

  async function verifyOtp() {
    const otp = Array.from(inputs).map(i => i.value).join("");

    if (otp.length !== 6) {
      Swal.fire("Error ❌", "Enter full OTP", "error");
      return;
    }

    const res = await fetch("/api/auth/verify-otp", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, otp }),
    });

    const data = await res.json();

    if (!res.ok) {
      Swal.fire("Error ❌", data.message, "error");
      return;
    }

    Swal.fire("Success ✅", "Account verified successfully", "success");

    localStorage.removeItem("signupEmail");

    setTimeout(() => {
      window.location.href = "login.html";
    }, 1500);
  }
</script>
