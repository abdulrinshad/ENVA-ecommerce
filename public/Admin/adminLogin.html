<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Login - Tokyo Sports</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- GOOGLE FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      background: #f4f6f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .admin-wrapper {
      background: #fff;
      width: 900px;
      display: flex;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 25px 50px rgba(0,0,0,0.12);
    }

    /* LEFT */
    .admin-left {
      flex: 1;
      padding: 60px;
    }

    .badge {
      display: inline-block;
      background: #e8f0ff;
      color: #3b82f6;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .admin-left h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    .admin-left p {
      color: #555;
      margin-bottom: 30px;
    }

    .admin-left input {
      width: 100%;
      padding: 14px 18px;
      border-radius: 30px;
      border: none;
      background: #eef3ff;
      margin-bottom: 20px;
      font-size: 14px;
      outline: none;
    }

    .password-box {
      position: relative;
    }

    .toggle-password {
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 14px;
    }

    .admin-left button {
      width: 100%;
      padding: 14px;
      border-radius: 30px;
      border: none;
      background: #3b82f6;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    .admin-left button:hover {
      background: #2563eb;
    }

    .back-link {
      display: inline-block;
      margin-top: 25px;
      color: #555;
      font-size: 14px;
      text-decoration: none;
    }

    /* RIGHT */
    .admin-right {
      flex: 1;
      background: #f9fafb;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .admin-right img {
      width: 80%;
      border-radius: 20px;
    }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      .admin-wrapper {
        flex-direction: column;
        width: 90%;
      }

      .admin-right {
        display: none;
      }
    }
  </style>
</head>
<body>

  <div class="admin-wrapper">
    
    <!-- LEFT -->
    <div class="admin-left">
      <span class="badge">ADMIN PORTAL</span>
      <h1>Welcome Back</h1>
      <p>Please enter your admin credentials to access the dashboard.</p>

      <form id="adminLoginForm">
        <input type="email" id="email" placeholder="Admin Email" required>

        <div class="password-box">
          <input type="password" id="password" placeholder="Password" required>
          <span class="toggle-password" id="togglePassword">👁</span>
        </div>

        <button type="submit">Sign In</button>
      </form>

      <a href="/" class="back-link">← Back to Shop Website</a>
    </div>

    <!-- RIGHT -->
    <div class="admin-right">
      <img src="ENVA.png" alt="Tokyo Sports">
    </div>

  </div>

 <script>
const form = document.getElementById("adminLoginForm");
const toggle = document.getElementById("togglePassword");
const passwordInput = document.getElementById("password");

toggle.addEventListener("click", () => {
  passwordInput.type =
    passwordInput.type === "password" ? "text" : "password";
});

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const email = document.getElementById("email").value.trim();
  const password = passwordInput.value.trim();

  try {
    const res = await fetch("/api/auth/admin/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (!res.ok) {
      alert(data.message || "Login failed");
      return;
    }

    localStorage.setItem("adminToken", data.token);
    alert("✅ Admin login successful");
    window.location.href = "/admin/dashboard.html";

  } catch (err) {
    alert("Server error");
    console.error(err);
  }
});
</script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="/js/popup.js"></script>
</body>
</html>
