<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Product Overview | ENVA Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Poppins',sans-serif;
  background:#f3f5f9;
}

.main-card{
  background:#ffffff;
  border-radius:20px;
  padding:30px;
  box-shadow:0 8px 30px rgba(0,0,0,0.05);
}

.main-img{
  width:100%;
  height:420px;
  object-fit:cover;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.thumb{
  width:80px;
  height:80px;
  border-radius:12px;
  object-fit:cover;
  cursor:pointer;
  transition:0.2s;
  border:2px solid transparent;
}

.thumb:hover{
  transform:scale(1.05);
  border-color:#0d6efd;
}

.price-badge{
  display:inline-block;
  background:#eef4ff;
  color:#0d6efd;
  font-weight:600;
  padding:8px 16px;
  border-radius:30px;
  font-size:1rem;
}

.section-title{
  font-size:0.8rem;
  color:#6c757d;
  margin-bottom:5px;
}

.section-value{
  font-weight:600;
  margin-bottom:20px;
}

.stock-card{
  background:#f9fafc;
  padding:20px;
  border-radius:15px;
  box-shadow:0 4px 15px rgba(0,0,0,0.04);
}

.size-pill{
  background:#eef2ff;
  padding:6px 12px;
  border-radius:20px;
  font-size:0.75rem;
  font-weight:500;
}

.status-pill{
  padding:6px 14px;
  border-radius:30px;
  font-size:0.75rem;
  font-weight:600;
}

.btn-outline-custom{
  border-radius:30px;
  padding:8px 20px;
}
</style>
</head>
<body>

<div class="container mt-5 mb-5">
<div class="main-card">

<div class="d-flex justify-content-between align-items-center mb-4">
  <h4 class="fw-bold mb-0">Product Overview</h4>

  <div>
    <a href="edit.product.html?id=" id="editBtn" class="btn btn-outline-primary btn-outline-custom me-2">Edit</a>
    <a href="ProductList.html" class="btn btn-light btn-outline-custom">Back</a>
  </div>
</div>

<div class="row g-5">

  <!-- IMAGE SECTION -->
  <div class="col-lg-6">

    <img id="mainImage" class="main-img mb-4" src="">

    <div id="thumbContainer" class="d-flex gap-3"></div>

  </div>

  <!-- DETAILS -->
  <div class="col-lg-6">

    <div class="section-title">Product Name</div>
    <div id="productName" class="section-value fs-4"></div>

    <div class="section-title">Price</div>
    <div id="price" class="price-badge mb-3"></div>

    <div class="section-title">Category</div>
    <div id="category" class="section-value"></div>

    <div class="section-title">Description</div>
    <div id="description" class="section-value"></div>

    <div class="stock-card mt-4">

      <div class="row">

        <div class="col-md-6">
          <div class="section-title">Sizes & Stock</div>
          <div id="sizesContainer" class="d-flex flex-wrap gap-2 mt-2"></div>
        </div>

        <div class="col-md-3">
          <div class="section-title">Total</div>
          <div id="totalStock" class="section-value"></div>
        </div>

        <div class="col-md-3">
          <div class="section-title">Status</div>
          <div id="stockStatus"></div>
        </div>

      </div>

    </div>

  </div>

</div>
</div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const productId = params.get("id");
const token = localStorage.getItem("adminToken");

if (!productId || !token) {
  window.location.href = "ProductList.html";
}

document.getElementById("editBtn").href =
  "edit.product.html?id=" + productId;

async function loadProduct(){
  const res = await fetch(`/api/products/admin/products/${productId}`,{
    headers:{ Authorization:`Bearer ${token}` }
  });

  const data = await res.json();
  const product = data.product || data;

  document.getElementById("productName").innerText = product.name;
  document.getElementById("price").innerText = "₹" + product.price;
  document.getElementById("category").innerText = product.category?.name || "N/A";
  document.getElementById("description").innerText = product.description || "";

  const mainImage = document.getElementById("mainImage");
  const thumbContainer = document.getElementById("thumbContainer");

  thumbContainer.innerHTML = "";

  if(product.images?.length){
    mainImage.src = product.images[0];

    product.images.forEach(img=>{
      const thumb = document.createElement("img");
      thumb.src = img;
      thumb.className = "thumb";
      thumb.onclick = ()=> mainImage.src = img;
      thumbContainer.appendChild(thumb);
    });
  }

  const sizesContainer = document.getElementById("sizesContainer");
  sizesContainer.innerHTML = "";

  let total = 0;
  const sizes = product.sizes || {};

  Object.entries(sizes).forEach(([size,qty])=>{
    total += Number(qty);

    const pill = document.createElement("span");
    pill.className = "size-pill";
    pill.innerText = size + " : " + qty;
    sizesContainer.appendChild(pill);
  });

  document.getElementById("totalStock").innerText = total;

  let statusClass = "";
  let text = "";

  if(total === 0){
    statusClass = "bg-danger text-white";
    text = "Out of Stock";
  }else if(total <= 5){
    statusClass = "bg-warning text-dark";
    text = "Low Stock";
  }else{
    statusClass = "bg-success text-white";
    text = "In Stock";
  }

  document.getElementById("stockStatus").innerHTML =
    `<span class="status-pill ${statusClass}">${text}</span>`;
}

loadProduct();
</script>

</body>
</html>
