<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wings Admin | Offers & Promotions</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --sidebar-width: 260px;
            --sidebar-bg: #ffffff;
            --main-bg: #F8F9FD;
            --card-bg: #ffffff;
            --text-dark: #2D3748;
            --text-gray: #A0AEC0;
            --accent-blue: #6C8EEF;
            --card-border: #EDF2F7;
            --trend-up: #4FD1C5;
            --offer-orange: #FF805D;
        }

        [data-theme="dark"] {
            --sidebar-bg: #1A202C;
            --main-bg: #11141D;
            --card-bg: #1A202C;
            --text-dark: #E2E8F0;
            --text-gray: #718096;
            --card-border: #2D3748;
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: var(--main-bg);
            color: var(--text-dark);
            margin: 0;
            display: flex;
            transition: all 0.3s ease;
        }
        /* --- SIDEBAR (Left Side) --- */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            height: 100vh;
            position: fixed;
            left: 0; top: 0;
            border-right: 1px solid var(--card-border);
            display: flex;
            flex-direction: column;
            z-index: 1050;
            transition: transform 0.3s ease;
        }

        .sidebar-scroll {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .sidebar-brand img { height: 45px; margin-bottom: 25px; }

        
        /* Sidebar Bottom (Admin Section) */
        .admin-footer {
            padding: 20px; border-top: 1px solid var(--card-border); background: var(--sidebar-bg);
        }

        .admin-profile-box { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .admin-avatar { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; }
        .admin-name { font-size: 0.85rem; font-weight: 600; color: var(--text-dark); margin: 0; }
        .admin-email { font-size: 0.7rem; color: var(--text-gray); margin: 0; }

        .menu-label { font-size: 0.75rem; color: var(--text-gray); text-transform: capitalize; margin: 20px 0 10px 10px; font-weight: 500; }
        .nav-item {
            display: flex; align-items: center; padding: 12px 15px;
            color: var(--text-gray); text-decoration: none; border-radius: 10px;
            margin-bottom: 5px; font-size: 0.9rem; transition: 0.2s;
        }
        .nav-item.active { background: var(--accent-blue); color: #fff; }
        .nav-item i { margin-right: 12px; font-size: 1.1rem; }
        .nav-item:hover:not(.active) { background: rgba(108, 142, 239, 0.1); color: var(--accent-blue); }

        /* --- MAIN WRAPPER --- */
        .main-wrapper {
            margin-left: var(--sidebar-width);
            width: calc(100% - var(--sidebar-width));
            padding: 30px;
            min-height: 100vh;
        }

           /* Sidebar Brand Styling */
.sidebar-brand {
    padding: 20px;
    display: flex;
    align-items: center;
}

/* Brand Text Style matching your existing ENVA logo */
.sidebar-brand .logo {
    font-size: 24px;
    font-weight: 800; /* Extra bold as seen in your main logo */
    letter-spacing: 1px;
    color: #000; /* Or use #252B42 to match your header text */
    text-transform: uppercase;
    text-decoration: none;
}


        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 35px; }

        /* --- OFFER SPECIFIC STYLES --- */
        .offer-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
        }

        .form-label { font-size: 0.85rem; font-weight: 500; color: var(--text-dark); }
        .form-control, .form-select {
            background: var(--main-bg);
            border: 1px solid var(--card-border);
            color: var(--text-dark);
            border-radius: 10px;
            padding: 10px 15px;
            font-size: 0.9rem;
        }

        .btn-primary-custom {
            background: var(--accent-blue);
            border: none;
            padding: 10px 25px;
            border-radius: 10px;
            font-weight: 500;
            color: #fff;
        }

        /* --- TABLE STYLE --- */
        .table-container {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 15px;
            overflow: hidden;
        }
        .table { margin-bottom: 0; vertical-align: middle; color: var(--text-dark); }
        .table thead { background: var(--main-bg); }
        .table th { border: none; font-size: 0.75rem; text-transform: uppercase; color: var(--text-gray); padding: 15px 20px; }
        .table td { border-top: 1px solid var(--card-border); padding: 15px 20px; font-size: 0.85rem; }

        .badge-active { background: rgba(79, 209, 197, 0.1); color: var(--trend-up); padding: 5px 12px; border-radius: 8px; font-size: 0.75rem; }
        .badge-expired { background: rgba(255, 128, 93, 0.1); color: var(--offer-orange); padding: 5px 12px; border-radius: 8px; font-size: 0.75rem; }

        .theme-toggle {
            cursor: pointer; width: 40px; height: 40px; border-radius: 50%;
            background: var(--card-bg); border: 1px solid var(--card-border);
            display: flex; align-items: center; justify-content: center; color: var(--text-gray);
        }

        @media (max-width: 992px) {
            .sidebar { transform: translateX(-100%); transition: 0.3s; }
            .sidebar.active { transform: translateX(0); }
            .main-wrapper { margin-left: 0; width: 100%; padding: 15px; }
            .mobile-toggle { display: block !important; }
        }
        .mobile-toggle { display: none; font-size: 1.5rem; cursor: pointer; }
    </style>
</head>
<body data-theme="light">

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-scroll">
            <div class="sidebar-brand">
    <span class="logo">ENVA</span>
</div>
            <p class="menu-label">Main menu</p>
            <a href="dashbord.html" class="nav-item "><i class="bi bi-grid"></i> Dashboard</a>
            <a href="OrderManagement.html" class="nav-item"><i class="bi bi-cart"></i> Order Management</a>
            <a href="customers.html" class="nav-item"><i class="bi bi-people"></i> Customers</a>
            <a href="coupon.html" class="nav-item"><i class="bi bi-ticket-perforated"></i> Coupon Code</a>
            <a href="categories.html" class="nav-item"><i class="bi bi-tags"></i> Categories</a>
            <a href="transaction.html" class="nav-item"><i class="bi bi-arrow-left-right"></i> Transaction</a>
            <a href="Offers.html" class="nav-item active"><i class="bi bi-megaphone"></i> Offers & Ads</a>
           

            <p class="menu-label">Product</p>
            <a href="AddProduct.html" class="nav-item"><i class="bi bi-plus-circle"></i> Add Products</a>
           
            <a href="ProductList.html" class="nav-item"><i class="bi bi-list-ul"></i> Product List</a>
            <a href="ProductReviews.html" class="nav-item"><i class="bi bi-chat-left-text"></i> Product Reviews</a>
        </div>

        <div class="admin-footer">
            <p class="menu-label" style="margin-left:0; margin-top:0">Admin</p>
            <a href="AdminRole.html" class="nav-item p-0 mb-3"><i class="bi bi-person-gear"></i> Admin role</a>
            <div class="admin-profile-box">
                <img src="profile-pic.png" class="admin-avatar" alt="Admin">
                <div class="admin-info">
                    <p class="admin-name">ENVA</p>
                    <p class="admin-email">enva@gmail.com</p>
                </div>
                <i class="bi bi-box-arrow-right text-gray" style="cursor: pointer;"></i>
            </div>
            <a href="#" class="nav-item p-0" style="color: var(--accent-blue); font-weight: 600;">
                <i class="bi bi-shop"></i> Your Shop <i class="bi bi-box-arrow-up-right ms-auto small"></i>
            </a>
        </div>
    </aside>

    <main class="main-wrapper">
  <div class="top-bar">
    <div class="d-flex align-items-center gap-3">
      <i class="bi bi-list mobile-toggle"
         onclick="document.getElementById('sidebar').classList.toggle('active')"></i>
      <h4 class="m-0 fw-semibold">Offers & Promotions</h4>
    </div>
    <div class="d-flex align-items-center gap-3">
      <div class="theme-toggle" onclick="toggleTheme()">
        <i class="bi bi-moon-stars-fill" id="tIcon"></i>
      </div>
      <img src="profile-pic.png" class="rounded-circle border" width="38" height="38">
    </div>
  </div>

  <div class="row">
    <!-- ================= CREATE OFFER ================= -->
    <div class="col-lg-5">
      <div class="offer-card">
        <h5 class="fw-semibold mb-4">Create New Offer</h5>

        <form id="offerForm" novalidate>
          <div class="mb-3">
            <label class="form-label">Offer Title</label>
            <input
              id="title"
              type="text"
              class="form-control"
              placeholder="e.g. Summer Mega Sale"
              required
            >
          </div>

          <div class="mb-3">
            <label class="form-label">Offer Type</label>
            <select id="type" class="form-select" required>
              <option value="">Select</option>
              <option value="product">Product Offer</option>
              <option value="category">Category Offer</option>
            </select>
          </div>

          <!-- PRODUCT -->
          <div class="mb-3 d-none" id="productBox">
            <label class="form-label">Select Product</label>
            <select id="product" class="form-select">
              <option value="">Select product</option>
            </select>
          </div>

          <!-- CATEGORY -->
          <div class="mb-3 d-none" id="categoryBox">
            <label class="form-label">Select Category</label>
            <select id="category" class="form-select">
              <option value="">Select category</option>
            </select>
          </div>

          <div class="row mb-3">
            <div class="col-6">
              <label class="form-label">Discount Type</label>
              <select id="discountType" class="form-select">
                <option value="percentage">Percentage (%)</option>
                <option value="flat">Flat Amount</option>
              </select>
            </div>
            <div class="col-6">
              <label class="form-label">Discount Value</label>
              <input
                id="discountValue"
                type="number"
                class="form-control"
                placeholder="20"
                min="1"
                required
              >
            </div>
          </div>

          <div class="row mb-4">
            <div class="col-6">
              <label class="form-label">Start Date</label>
              <input id="startDate" type="date" class="form-control" required>
            </div>
            <div class="col-6">
              <label class="form-label">End Date</label>
              <input id="endDate" type="date" class="form-control" required>
            </div>
          </div>

          <button type="submit" class="btn-primary-custom w-100">
            Publish Offer
          </button>
        </form>
      </div>
    </div>

    <!-- ================= OFFER LIST ================= -->
    <div class="col-lg-7">
      <div class="table-container">
        <div class="p-3 bg-white border-bottom">
          <h6 class="m-0 fw-semibold">Live Promotions</h6>
        </div>

        <div class="table-responsive">
          <table class="table">
            <thead>
              <tr>
                <th>Offer Details</th>
                <th>Value</th>
                <th>Status</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="offersTable">
              <!-- JS renders rows here -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</main>



   <script>
document.addEventListener("DOMContentLoaded", () => {

  /* ===============================
     THEME TOGGLE
  ============================== */
  window.toggleTheme = function () {
    const b = document.body;
    const i = document.getElementById("tIcon");
    const isDark = b.getAttribute("data-theme") === "dark";

    b.setAttribute("data-theme", isDark ? "light" : "dark");
    i.classList.toggle("bi-moon-stars-fill");
    i.classList.toggle("bi-sun-fill");
  };

  /* ===============================
     ELEMENT REFERENCES (CRITICAL)
  ============================== */
  const offerForm = document.getElementById("offerForm");
  const titleInput = document.getElementById("title");
  const typeSelect = document.getElementById("type");
  const productSelect = document.getElementById("product");
  const categorySelect = document.getElementById("category");
  const discountTypeSelect = document.getElementById("discountType");
  const discountValueInput = document.getElementById("discountValue");
  const startDateInput = document.getElementById("startDate");
  const endDateInput = document.getElementById("endDate");

  const productBox = document.getElementById("productBox");
  const categoryBox = document.getElementById("categoryBox");
  const offersTable = document.getElementById("offersTable");

  /* ===============================
     TOGGLE PRODUCT / CATEGORY
  ============================== */
  typeSelect.addEventListener("change", () => {
    productBox.classList.add("d-none");
    categoryBox.classList.add("d-none");

    if (typeSelect.value === "product") productBox.classList.remove("d-none");
    if (typeSelect.value === "category") categoryBox.classList.remove("d-none");
  });

  /* ===============================
     LOAD PRODUCTS
  ============================== */
  async function loadProducts() {
    const res = await fetch("/api/products");
    const products = await res.json();

    productSelect.innerHTML = `<option value="">Select</option>`;
    products.forEach(p => {
      productSelect.innerHTML += `<option value="${p._id}">${p.name}</option>`;
    });
  }

  /* ===============================
     LOAD CATEGORIES
  ============================== */
  async function loadCategories() {
    const res = await fetch("/api/categories");
    const categories = await res.json();

    categorySelect.innerHTML = `<option value="">Select</option>`;
    categories.forEach(c => {
      categorySelect.innerHTML += `<option value="${c._id}">${c.name}</option>`;
    });
  }

  /* ===============================
     CREATE OFFER
  ============================== */
  offerForm.addEventListener("submit", async (e) => {
    e.preventDefault();

    const payload = {
      title: titleInput.value,
      type: typeSelect.value,
      product: productSelect.value || null,
      category: categorySelect.value || null,
      discountType: discountTypeSelect.value,
      discountValue: discountValueInput.value,
      startDate: startDateInput.value,
      endDate: endDateInput.value
    };

    console.log("Submitting offer:", payload);

    const res = await fetch("/api/offers", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    if (!res.ok) {
      alert("Failed to create offer");
      return;
    }

    alert("Offer created successfully");
    offerForm.reset();
    productBox.classList.add("d-none");
    categoryBox.classList.add("d-none");
    loadOffers();
  });

  /* ===============================
     LOAD OFFERS
  ============================== */
  async function loadOffers() {
    const res = await fetch("/api/offers");
    const offers = await res.json();

    offersTable.innerHTML = "";

    offers.forEach(o => {
      offersTable.innerHTML += `
        <tr>
          <td>
            <div class="fw-600">${o.title}</div>
            <small class="text-gray">${o.target}</small>
          </td>
          <td><b>${o.discount}</b></td>
          <td>
            <span class="${o.status === "Active" ? "badge-active" : "badge-expired"}">
              ${o.status}
            </span>
          </td>
          <td>
            <button class="btn btn-sm text-danger"
                    onclick="deleteOffer('${o._id}')">
              <i class="bi bi-trash"></i>
            </button>
          </td>
        </tr>
      `;
    });
  }

  /* ===============================
     DELETE OFFER
  ============================== */
  window.deleteOffer = async function (id) {
    if (!confirm("Delete this offer?")) return;
    await fetch(`/api/offers/${id}`, { method: "DELETE" });
    loadOffers();
  };

  /* ===============================
     INIT
  ============================== */
  loadProducts();
  loadCategories();
  loadOffers();

});
</script>


</body>
